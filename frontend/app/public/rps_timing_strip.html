<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Squad RPS — Animation Timing Strip v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#0a0b0f;font-family:'Courier New',monospace;color:#e8dcc8;overflow-x:hidden}
:root{--gold:#f2c96e;--red:#e84343;--blue:#3d8fe8;--strip-bg:#111218;--border:#2a2d3a;--muted:#6b7280}
.app{display:flex;flex-direction:column;min-height:100vh}
.top-bar{background:#0e0f14;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:700;color:var(--gold);letter-spacing:4px;white-space:nowrap}
.logo span{color:var(--red)}
.tab-row{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:5px 14px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all 120ms}
.tab:hover{border-color:var(--gold);color:var(--gold)}
.tab.active{background:var(--gold);color:#0a0b0f;border-color:var(--gold);font-weight:700}
.main{display:grid;grid-template-columns:1fr 260px;flex:1;gap:0}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.content{padding:24px;overflow-y:auto}
.sidebar{background:#0e0f14;border-left:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:18px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.panel-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px solid rgba(42,45,58,0.4);font-size:10px}
.info-row span{color:var(--muted)}
.info-row strong{color:#e8dcc8;text-align:right;font-weight:normal}
.legend-row{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--muted);margin-bottom:5px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.zone-badge{font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:2px;margin-bottom:5px;display:inline-block}
.zone-ai{background:rgba(61,143,232,0.15);color:var(--blue);border:1px solid rgba(61,143,232,0.35)}
.zone-player{background:rgba(232,67,67,0.15);color:var(--red);border:1px solid rgba(232,67,67,0.35)}
.zone-neutral{background:rgba(100,120,100,0.15);color:#6b7280;border:1px solid rgba(100,120,100,0.3)}
.board-wrapper{display:flex;gap:6px;align-items:stretch}
.row-labels{display:flex;flex-direction:column;justify-content:space-between;padding:3px 0}
.row-label{font-size:9px;color:var(--muted);text-align:right;width:14px;line-height:1}
.col-labels{display:flex;justify-content:space-around;padding:0 3px;margin-top:4px}
.col-label{font-size:9px;color:var(--muted);text-align:center;flex:1}
.board-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;background:#1a1c24;border:2px solid #2a2d3a;border-radius:4px;padding:3px;flex:1}
.cell{width:100%;aspect-ratio:1;border-radius:2px;display:flex;align-items:center;justify-content:center;position:relative;transition:transform 120ms;cursor:default}
.cell.ai-zone{background:rgba(61,143,232,0.10);border:1px solid rgba(61,143,232,0.2)}
.cell.player-zone{background:rgba(232,67,67,0.10);border:1px solid rgba(232,67,67,0.2)}
.cell.neutral{background:#141620;border:1px solid #1c1f2e}
.cell.has-unit:hover{transform:scale(1.12);z-index:2;cursor:pointer}
.unit-icon{font-size:18px;line-height:1}
.unit-flag{position:absolute;top:1px;right:2px;font-size:9px}
.unit-decoy{position:absolute;top:2px;right:2px;width:8px;height:8px;background:#9333ea;border-radius:1px;transform:rotate(45deg);border:1px solid rgba(255,255,255,0.4)}
.board-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:12px}
.stat-box{background:#111318;border:1px solid var(--border);border-radius:3px;padding:8px 10px;text-align:center}
.stat-box .n{font-size:20px;font-weight:700;color:var(--gold);line-height:1}
.stat-box .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.strip-section{display:flex;flex-direction:column;gap:14px}
.strip-card{background:var(--strip-bg);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.strip-header{background:#13151e;padding:9px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.strip-name{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);flex:1}
.strip-meta{font-size:10px;color:var(--muted);letter-spacing:0.5px;white-space:nowrap}
.team-badge{font-size:9px;padding:2px 8px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.badge-red{background:rgba(232,67,67,0.15);color:var(--red);border:1px solid rgba(232,67,67,0.35)}
.badge-blue{background:rgba(61,143,232,0.15);color:var(--blue);border:1px solid rgba(61,143,232,0.35)}
.badge-gold{background:rgba(242,201,110,0.12);color:var(--gold);border:1px solid rgba(242,201,110,0.3)}
.frames-row{display:flex;align-items:flex-end;gap:4px;padding:14px 16px 8px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.frame-cell{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.frame-img-wrap{width:76px;height:76px;background:transparent;border-radius:3px;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:border-color 150ms,background 150ms;cursor:pointer}
.frame-img-wrap:hover,.frame-img-wrap.active{border-color:var(--gold);background:rgba(242,201,110,0.06)}
.frame-img-wrap img{width:100%;height:100%;object-fit:contain;mix-blend-mode:screen;filter:contrast(1.05) saturate(1.1)}
.frame-img-wrap .fallback{font-size:30px;line-height:1}
.frame-num{font-size:9px;color:var(--muted);letter-spacing:1px}
.frame-label{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px;text-align:center;max-width:76px;line-height:1.3}
.vs-gap{width:20px;display:flex;align-items:center;justify-content:center;height:76px;font-size:11px;color:var(--gold);font-weight:700;flex-shrink:0}
.timing-bar-wrap{margin:0 16px 4px}
.timing-bar{height:3px;background:#1e2030;border-radius:2px;position:relative;overflow:hidden}
.timing-fill{position:absolute;left:0;top:0;bottom:0;background:var(--gold);border-radius:2px;transition:width 100ms linear}
.playback{background:#0e0f14;border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px}
.play-btn{padding:4px 16px;border-radius:2px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-family:'Courier New',monospace;font-size:11px;cursor:pointer;letter-spacing:1px;transition:all 120ms;white-space:nowrap}
.play-btn:hover,.play-btn.playing{background:var(--gold);color:#0a0b0f}
.scrub-input{flex:1;height:3px;-webkit-appearance:none;appearance:none;background:#2a2d3a;border-radius:2px;cursor:pointer;outline:none}
.scrub-input::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold);cursor:pointer}
.frame-ctr{font-size:10px;color:var(--muted);min-width:48px;text-align:right}
.src-img-wrap{padding:14px 16px}
.src-img-wrap img{width:100%;border-radius:3px;border:1px solid var(--border);mix-blend-mode:luminosity;filter:contrast(1.1) saturate(1.05);display:block}
.missing{padding:20px;text-align:center;color:var(--muted);font-size:11px;border:1px dashed var(--border);border-radius:3px;line-height:1.8}
.ref-table{width:100%;border-collapse:collapse;font-size:10px}
.ref-table th{text-align:left;padding:6px 10px;color:var(--muted);letter-spacing:1px;font-weight:normal;border-bottom:1px solid var(--border)}
.ref-table td{padding:5px 10px}
.ref-table tr{border-bottom:1px solid rgba(42,45,58,0.4)}
.ref-table tr:nth-child(even){background:rgba(255,255,255,0.015)}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="logo">Squad<span>RPS</span></div>
    <div class="tab-row" id="tabRow">
      <button class="tab active" data-view="board">5x6 Board</button>
      <button class="tab" data-view="attack">Attack Strips</button>
      <button class="tab" data-view="moves">Movement</button>
      <button class="tab" data-view="judge">Judge</button>
      <button class="tab" data-view="roles_red">Roles Red</button>
      <button class="tab" data-view="roles_blue">Roles Blue</button>
      <button class="tab" data-view="ref">Full Ref</button>
    </div>
  </div>
  <div class="main">
    <div class="content" id="mainContent"></div>
    <div class="sidebar">
      <div><div class="sidebar-title">Strip info</div><div id="sidebarInfo"></div></div>
      <div>
        <div class="sidebar-title">Legend</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--gold)"></div>Active frame</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--red)"></div>Red / Player team</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--blue)"></div>Blue / AI team</div>
        <div class="legend-row"><div class="legend-dot" style="background:#9333ea"></div>Decoy role</div>
        <div class="legend-row"><div class="legend-dot" style="background:#22c55e"></div>Flag bearer</div>
        <div class="legend-row"><div class="legend-dot" style="background:#374151"></div>Neutral zone</div>
      </div>
      <div>
        <div class="sidebar-title">Board PRD spec</div>
        <div class="info-row"><span>Grid</span><strong>5 cols x 6 rows</strong></div>
        <div class="info-row"><span>Total tiles</span><strong>30</strong></div>
        <div class="info-row"><span>Player rows</span><strong>1-2 (10 units)</strong></div>
        <div class="info-row"><span>AI rows</span><strong>5-6 (10 units)</strong></div>
        <div class="info-row"><span>Neutral rows</span><strong>3-4 (10 empty)</strong></div>
        <div class="info-row"><span>Special roles</span><strong>1 Flag + 1 Decoy</strong></div>
      </div>
    </div>
  </div>
</div>

<script>
const TIMERS={};
const INFO={
  board:{rows:[['Grid','5 cols x 6 rows'],['Total tiles','30'],['Player units','10'],['AI units','10'],['Neutral zone','Rows 3-4 (10 empty)']]},
  attack:{rows:[['Source','moovment/attack player.png'],['Sequences','3'],['Frames each','6'],['Phases','Idle-Windup-Strike-Impact-Win-End'],['Frame time','80ms'],['Total','480ms/duel']]},
  moves:{rows:[['Source','moovment/timing.png'],['Teams','Red + Blue'],['Idle frames','6'],['Walk frames','6'],['Jump frames','6'],['Attack frames','8'],['Hit frames','4'],['Die frames','6']]},
  judge:{rows:[['Source','moovment/judge.png'],['Character','Yellow dragon referee'],['Frames','5'],['Total','1500ms'],['Trigger','Match start coin-flip']]},
  roles_red:{rows:[['Source','moovment/dicoy flag only red.png'],['Flag walk','6 frames'],['Decoy walk','6 frames'],['Idle anims','4 types'],['Weapon poses','Rock/Paper/Scissors']]},
  roles_blue:{rows:[['Source','moovment/dickoy flag wait ex.png'],['Flag walk','6 frames'],['Decoy walk','6 frames'],['Idle anims','4 types'],['Board indicators','5 states']]},
  ref:{rows:[['Total strips','Red 11 + Blue 11'],['FPS','24'],['Idle mode','loop'],['Attack mode','once'],['Die mode','once'],['Sprite','CSS steps()']]}
};

function setInfo(k){
  document.getElementById('sidebarInfo').innerHTML=(INFO[k]||INFO.board).rows.map(([a,b])=>`<div class="info-row"><span>${a}</span><strong>${b}</strong></div>`).join('');
}

function mkF(labels,fallbacks){return labels.map((l,i)=>({label:l,fallback:fallbacks?fallbacks[i]:'?'}));}

function makeStrip({id,name,badge,bc,frames,fps,ms,note}){
  const fc=frames.length;
  let h=`<div class="strip-card"><div class="strip-header"><span class="strip-name">${name}</span><span class="team-badge ${bc}">${badge}</span><span class="strip-meta">${fc} FRAMES · ${ms}ms · ${fps}fps</span></div><div class="frames-row" id="fr-${id}">`;
  frames.forEach((f,i)=>{
    h+=`<div class="frame-cell"><div class="frame-img-wrap${i===0?' active':''}" id="fi-${id}-${i}" title="F${i+1}: ${f.label}"><span class="fallback">${f.fallback||'?'}</span></div><div class="frame-num">F${i+1}</div><div class="frame-label">${f.label}</div></div>`;
    if(f.vs)h+=`<div class="vs-gap">${f.vs}</div>`;
  });
  h+=`</div><div class="timing-bar-wrap"><div class="timing-bar"><div class="timing-fill" id="tb-${id}" style="width:${100/fc}%"></div></div></div><div class="playback"><button class="play-btn" data-id="${id}" data-fc="${fc}" data-ms="${Math.round(ms/fc)}">play</button><input type="range" class="scrub-input" min="0" max="${fc-1}" value="0" data-id="${id}" data-fc="${fc}"><span class="frame-ctr" id="fc-${id}">1 / ${fc}</span></div>`;
  if(note)h+=`<div style="padding:5px 16px 10px;font-size:9px;color:var(--muted);line-height:1.6">${note}</div>`;
  h+=`</div>`;return h;
}

function makeSrc(src,alt){
  return `<div class="strip-card" style="border-color:rgba(242,201,110,0.25)"><div class="strip-header"><span class="strip-name">SOURCE IMAGE</span><span class="strip-meta">mix-blend-mode: luminosity</span></div><div class="src-img-wrap"><img src="${src}" alt="${alt}" onerror="this.outerHTML='<div class=missing>${alt} &mdash; place in /public/moovment/</div>'"></div></div>`;
}

function renderBoard(){
  const units=[
    {r:6,c:1,w:'📄'},{r:6,c:2,w:'🪨'},{r:6,c:3,w:'✂️',flag:true},{r:6,c:4,w:'📄'},{r:6,c:5,w:'🪨'},
    {r:5,c:1,w:'✂️'},{r:5,c:2,w:'📄'},{r:5,c:3,w:'🪨'},{r:5,c:4,w:'✂️',decoy:true},{r:5,c:5,w:'📄'},
    {r:2,c:1,w:'🪨'},{r:2,c:2,w:'✂️',flag:true},{r:2,c:3,w:'📄'},{r:2,c:4,w:'🪨'},{r:2,c:5,w:'✂️'},
    {r:1,c:1,w:'📄'},{r:1,c:2,w:'🪨'},{r:1,c:3,w:'✂️'},{r:1,c:4,w:'📄',decoy:true},{r:1,c:5,w:'🪨'}
  ];
  const umap={};units.forEach(u=>umap[`${u.r}-${u.c}`]=u);
  let h=`<div class="panel-title">5x6 BOARD LAYOUT — 30 tiles · 10 units per side</div>
  <span class="zone-badge zone-ai">AI ZONE rows 5-6</span><br><br>
  <div class="board-wrapper"><div class="row-labels">`;
  for(let r=6;r>=1;r--)h+=`<div class="row-label">${r}</div>`;
  h+=`</div><div class="board-grid">`;
  for(let r=6;r>=1;r--){
    const zone=r>=5?'ai-zone':r<=2?'player-zone':'neutral';
    for(let c=1;c<=5;c++){
      const u=umap[`${r}-${c}`];
      h+=`<div class="cell ${zone}${u?' has-unit':''}" title="Row ${r} Col ${c}${u?' · '+u.w+(u.flag?' FLAG':'')+(u.decoy?' DECOY':''):' empty'}">`;
      if(u){h+=`<span class="unit-icon">${u.w}</span>`;if(u.flag)h+=`<span class="unit-flag">🚩</span>`;if(u.decoy)h+=`<div class="unit-decoy"></div>`;}
      h+=`</div>`;
    }
  }
  h+=`</div></div><div class="col-labels">`;
  for(let c=1;c<=5;c++)h+=`<div class="col-label">${c}</div>`;
  h+=`</div><br><span class="zone-badge zone-player">PLAYER ZONE rows 1-2</span>`;
  h+=`<div class="board-stats"><div class="stat-box"><div class="n">30</div><div class="l">tiles</div></div><div class="stat-box"><div class="n">5x6</div><div class="l">grid</div></div><div class="stat-box"><div class="n">10</div><div class="l">units/side</div></div><div class="stat-box"><div class="n">10</div><div class="l">neutral</div></div></div>`;
  h+=`<div style="margin-top:16px;background:#111318;border:1px solid var(--border);border-radius:3px;padding:12px 14px"><div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">PRD board spec</div><pre style="font-size:10px;color:#9ca3af;line-height:2;font-family:'Courier New',monospace">Row 6 | AI   AI   AI   AI   AI   <- AI back row
Row 5 | AI   AI   AI   AI   AI   <- AI front row
Row 4 | .    .    .    .    .    <- neutral zone
Row 3 | .    .    .    .    .    <- neutral zone
Row 2 | P1   P1   P1   P1   P1  <- Player front row
Row 1 | P1   P1   P1   P1   P1  <- Player back row
         C1   C2   C3   C4   C5</pre><div style="margin-top:10px;font-size:10px;color:var(--muted)">Flag: instant loss when defeated &nbsp;·&nbsp; Decoy: absorbs attacks &nbsp;·&nbsp; Rows 3-4: neutral battle zone</div></div>`;
  return h;
}

function renderAttack(){
  let h=`<div class="panel-title">ATTACK TIMING STRIPS — attack player.png</div><div class="strip-section">`;
  h+=makeStrip({id:'sc_pk',name:'SCISSORS CUTS PAPER',badge:'SCISSORS WIN',bc:'badge-red',fps:24,ms:480,frames:mkF(['Idle','Wind-up','Strike','Impact','Win!','End'],['😤','✂️','⚡','💥','🏆','🌟']),note:'80ms per frame · attacker=scissors · defender=paper · frame 5 = win pose hold'});
  h+=makeStrip({id:'rk_sc',name:'ROCK BREAKS SCISSORS',badge:'ROCK WIN',bc:'badge-blue',fps:24,ms:480,frames:mkF(['Idle','Wind-up','Throw','Smash','Win!','End'],['😤','🪨','💨','💥','🏆','🌟']),note:'Rock attack triggers hero_red_jump_sprites for jump arc animation'});
  h+=makeStrip({id:'pp_rk',name:'PAPER WRAPS ROCK',badge:'PAPER WIN',bc:'badge-gold',fps:24,ms:480,frames:mkF(['Idle','Unfurl','Wrap','Trapped','Win!','End'],['😤','📄','🌀','🪨','🏆','🌟']),note:'Paper: character unfurls a scroll animation across the opponent'});
  h+=makeSrc('/moovment/attack player.png','attack player.png');
  h+=`</div>`;return h;
}

function renderMoves(){
  let h=`<div class="panel-title">MOVEMENT ANIMATION SHEET — timing.png</div><div class="strip-section">`;
  const rs=[
    {id:'r_idle',name:'RED IDLE',badge:'RED IDLE',bc:'badge-red',frames:mkF(['Idle 1','Idle 2','Idle 3','Idle 4','Idle 5','Idle 6'],['🧍','🧍','🧍','🧍','🧍','🧍']),ms:2400},
    {id:'r_walk',name:'RED WALK',badge:'RED WALK',bc:'badge-red',frames:mkF(['Step 1','Step 2','Step 3','Step 4','Step 5','Step 6'],['🚶','🚶','🚶','🚶','🚶','🚶']),ms:500},
    {id:'r_jump',name:'RED JUMP',badge:'RED JUMP',bc:'badge-red',frames:mkF(['Crouch','Rise','Peak','Fall','Land','Idle'],['🦵','⬆','🌟','⬇','💥','🧍']),ms:500},
    {id:'r_atk',name:'RED ATTACK',badge:'RED ATTACK',bc:'badge-red',frames:mkF(['Ready','Step','Wind','Charge','Strike','Impact','Flash','Hold'],['😤','👟','💪','⚡','🤜','💥','✨','🏆']),ms:640},
    {id:'r_hit',name:'RED HIT',badge:'RED HIT',bc:'badge-red',frames:mkF(['React','Stagger','Spin','Down'],['😮','😵','💫','😓']),ms:320},
    {id:'r_die',name:'RED DIE',badge:'RED DIE',bc:'badge-red',frames:mkF(['Fall 1','Fall 2','Fall 3','Lie 1','Lie 2','Gone'],['😵','💀','⬇','💨','·','·']),ms:480},
  ];
  h+=`<div style="background:#13151e;border:1px solid rgba(232,67,67,0.3);border-radius:4px;padding:10px 14px;margin-bottom:8px"><span style="font-size:11px;color:var(--red);letter-spacing:2px;text-transform:uppercase">PLAYER RED — ALL ANIMATION STATES</span></div>`;
  rs.forEach(s=>h+=makeStrip({id:s.id,name:s.name,badge:s.badge,bc:s.bc,frames:s.frames,fps:24,ms:s.ms}));
  const bs=[
    {id:'b_idle',name:'BLUE IDLE',badge:'BLUE IDLE',bc:'badge-blue',frames:mkF(['Idle 1','Idle 2','Idle 3','Idle 4','Idle 5'],['🧍','🧍','🧍','🧍','🧍']),ms:2400},
    {id:'b_walk',name:'BLUE WALK',badge:'BLUE WALK',bc:'badge-blue',frames:mkF(['Step 1','Step 2','Step 3','Step 4','Step 5','Step 6'],['🚶','🚶','🚶','🚶','🚶','🚶']),ms:500},
    {id:'b_jump',name:'BLUE JUMP',badge:'BLUE JUMP',bc:'badge-blue',frames:mkF(['Crouch','Rise','Peak','Fall','Land','Idle'],['🦵','⬆','🌟','⬇','💥','🧍']),ms:500},
    {id:'b_atk',name:'BLUE ATTACK',badge:'BLUE ATTACK',bc:'badge-blue',frames:mkF(['Ready','Step','Wind','Charge','Strike','Impact','Flash','Hold'],['😤','👟','💪','⚡','🤜','💥','✨','🏆']),ms:640},
    {id:'b_hit',name:'BLUE HIT',badge:'BLUE HIT',bc:'badge-blue',frames:mkF(['React','Stagger','Spin','Down'],['😮','😵','💫','😓']),ms:320},
    {id:'b_die',name:'BLUE DIE',badge:'BLUE DIE',bc:'badge-blue',frames:mkF(['Fall 1','Fall 2','Fall 3','Lie 1','Lie 2','Gone'],['😵','💀','⬇','💨','·','·']),ms:480},
  ];
  h+=`<div style="background:#13151e;border:1px solid rgba(61,143,232,0.3);border-radius:4px;padding:10px 14px;margin:4px 0 8px"><span style="font-size:11px;color:var(--blue);letter-spacing:2px;text-transform:uppercase">PLAYER BLUE (AI) — ALL ANIMATION STATES</span></div>`;
  bs.forEach(s=>h+=makeStrip({id:s.id,name:s.name,badge:s.badge,bc:s.bc,frames:s.frames,fps:24,ms:s.ms}));
  h+=makeSrc('/moovment/timing.png','timing.png');
  h+=`</div>`;return h;
}

}

function renderRef(){
  const rows=[
    ['IDLE','6','2400','loop','ease-in-out','Always on board'],
    ['WALK','6','500','loop','steps(6)','Move to empty tile'],
    ['JUMP','6','500','once','ease-out','Jump over neutral zone'],
    ['ATTACK','8','640','once','ease-in','Start a duel'],
    ['HIT','4','320','once','ease-out','Receive attack'],
    ['DIE','6','480','once','ease-in','Eliminated'],
    ['ROCK ATTACK','6','480','once','ease-in','Weapon=Rock duel'],
    ['PAPER ATTACK','6','480','once','ease-in','Weapon=Paper duel'],
    ['SCISSORS ATTACK','6','480','once','ease-in','Weapon=Scissors duel'],
    ['WIN POSE','4','320','hold','ease-out','Duel winner'],
    ['FLAG WALK','6','600','loop','linear','Flag-bearer moving'],
    ['DECOY WALK','6','600','loop','linear','Decoy moving'],
    ['FLAG IDLE','4','1600','loop','ease-in-out','Flag-bearer still'],
    ['DECOY IDLE','4','1600','loop','ease-in-out','Decoy still'],
    ['JUDGE FLIP','5','1500','once','ease-out','Match start'],
    ['WEAPON REVEAL','3','300','once','ease-out','Phase 1 to 2'],
    ['WEAPON HIDE','2','400','once','ease-in','After reveal ends'],
    ['DEATH','4','300','once','ease-in','Unit eliminated'],
  ];
  let h=`<div class="panel-title">COMPLETE ANIMATION REFERENCE</div><div style="overflow-x:auto;margin-bottom:14px"><table class="ref-table"><thead><tr>${['ANIMATION','FRAMES','MS','MODE','EASING','TRIGGER'].map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  rows.forEach(r=>{const mc=r[3]==='loop'?'#86efac':r[3]==='hold'?'#fbbf24':'#9ca3af';h+=`<tr><td style="color:var(--gold)">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td style="color:${mc}">${r[3]}</td><td style="color:#8fd7d0">${r[4]}</td><td style="color:var(--muted)">${r[5]}</td></tr>`;});
  h+=`</tbody></table></div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
  [['/moovment/timing.png','timing.png'],['/moovment/attack player.png','attack player.png'],['/moovment/judge.png','judge.png'],['/moovment/dicoy flag only red.png','dicoy flag only red.png']].forEach(([s,a])=>{
    h+=`<div class="strip-card"><div class="strip-header"><span class="strip-name" style="font-size:10px">${a}</span></div><div class="src-img-wrap"><img src="${s}" alt="${a}" onerror="this.outerHTML='<div class=missing>${a}</div>'"></div></div>`;
  });
  h+=`</div>`;return h;
}

const VIEWS={board:renderBoard,attack:renderAttack,moves:renderMoves,judge:renderJudge,roles_red:renderRolesRed,roles_blue:renderRolesBlue,ref:renderRef};

function stopAll(){Object.keys(TIMERS).forEach(k=>{clearInterval(TIMERS[k]);delete TIMERS[k]});}

function updateFrame(id,f,fc){
  const sc=document.querySelector(`.scrub-input[data-id="${id}"]`);
  const ctr=document.getElementById(`fc-${id}`);
  const tb=document.getElementById(`tb-${id}`);
  if(sc)sc.value=f;
  if(ctr)ctr.textContent=`${f+1} / ${fc}`;
  if(tb)tb.style.width=`${((f+1)/fc)*100}%`;
  for(let i=0;i<fc;i++){const el=document.getElementById(`fi-${id}-${i}`);if(el)el.classList.toggle('active',i===f);}
}

function attachPlayback(){
  document.querySelectorAll('.play-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id,fc=parseInt(btn.dataset.fc)||6,ms=parseInt(btn.dataset.ms)||160;
      if(TIMERS[id]){clearInterval(TIMERS[id]);delete TIMERS[id];btn.textContent='play';btn.classList.remove('playing');return;}
      btn.textContent='pause';btn.classList.add('playing');
      let f=0;
      TIMERS[id]=setInterval(()=>{f=(f+1)%fc;updateFrame(id,f,fc);},Math.max(60,ms));
    });
  });
  document.querySelectorAll('.scrub-input').forEach(sc=>{
    sc.addEventListener('input',()=>{const id=sc.dataset.id,fc=parseInt(sc.dataset.fc);updateFrame(id,parseInt(sc.value),fc);});
  });
}

function show(key){
  stopAll();
  document.getElementById('mainContent').innerHTML=VIEWS[key]?VIEWS[key]():'';
  setInfo(key);
  attachPlayback();
}

document.getElementById('tabRow').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  t.classList.add('active');show(t.dataset.view);
});

show('board');
</script>
